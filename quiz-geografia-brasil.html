<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Geografia do Brasil 🇧🇷</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00a86b;
    --green-light: #e6f9f2;
    --green-dark: #007a4d;
    --yellow: #ffd500;
    --yellow-light: #fffacc;
    --blue: #1a6fc4;
    --blue-light: #e6f0fb;
    --red: #e63946;
    --red-light: #fdecea;
    --bg: #f5f0e8;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 48px;
    background-image:
      radial-gradient(circle at 10% 15%, rgba(0,168,107,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(255,213,0,0.15) 0%, transparent 50%),
      radial-gradient(circle at 60% 40%, rgba(26,111,196,0.08) 0%, transparent 40%);
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }
  .flag-stripe {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .flag-stripe span {
    display: block;
    width: 36px; height: 8px; border-radius: 99px;
  }
  .flag-stripe .s1 { background: var(--green); }
  .flag-stripe .s2 { background: var(--yellow); }
  .flag-stripe .s3 { background: var(--blue); }

  .header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(28px, 6vw, 44px);
    color: var(--green-dark);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--blue); }
  .header p {
    font-size: 16px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 600;
  }

  /* CARD */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 28px 24px;
    width: 100%;
    max-width: 600px;
    animation: fadeUp 0.5s ease both;
    border: 2px solid rgba(0,168,107,0.08);
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .progress-track {
    height: 10px;
    background: #e5e7eb;
    border-radius: 99px;
    margin-bottom: 22px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #34d399);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* QUESTION */
  .question-num {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 8px;
  }
  .question-text {
    font-size: clamp(16px, 3.5vw, 20px);
    font-weight: 800;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 22px;
  }

  /* OPTIONS */
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 400px) { .options { grid-template-columns: 1fr; } }

  .opt {
    background: #f9fafb;
    border: 2px solid #e5e7eb;
    border-radius: 14px;
    padding: 14px 16px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .opt::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    opacity: 0;
    transition: opacity 0.15s;
    border-radius: 12px;
  }
  .opt:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--green-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(0,168,107,0.18);
  }
  .opt:disabled { cursor: default; transform: none !important; }
  .opt.correct {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
    animation: pop 0.3s ease;
  }
  .opt.wrong {
    background: var(--red-light);
    border-color: var(--red);
    color: var(--red);
  }
  .opt.reveal {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green-dark);
  }

  .opt-icon {
    display: inline-block;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #e5e7eb;
    color: var(--muted);
    font-size: 11px;
    font-weight: 800;
    text-align: center;
    line-height: 22px;
    margin-right: 8px;
    vertical-align: middle;
    transition: background 0.2s;
  }
  .opt.correct .opt-icon { background: var(--green); color: white; }
  .opt.wrong .opt-icon { background: var(--red); color: white; }
  .opt.reveal .opt-icon { background: var(--green); color: white; }

  /* FEEDBACK */
  .feedback {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    line-height: 1.5;
    animation: fadeUp 0.3s ease;
  }
  .feedback.correct { background: var(--green-light); color: var(--green-dark); border-left: 4px solid var(--green); }
  .feedback.wrong { background: var(--red-light); color: #b91c1c; border-left: 4px solid var(--red); }

  /* NEXT BUTTON */
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 4px 16px rgba(0,168,107,0.35);
    letter-spacing: 0.3px;
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,168,107,0.40); }
  .next-btn:active { transform: scale(0.98); }

  /* RESULT SCREEN */
  .result-screen {
    text-align: center;
    padding: 8px 0 12px;
    animation: fadeUp 0.5s ease;
  }
  .result-emoji {
    font-size: 72px;
    display: block;
    margin-bottom: 12px;
    animation: bounce 0.6s ease 0.3s both;
  }
  .result-title {
    font-family: 'Baloo 2', cursive;
    font-size: 28px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .result-score {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 99px;
    font-size: 22px;
    font-weight: 800;
    background: var(--green-light);
    color: var(--green-dark);
    margin: 14px 0;
    border: 2px solid rgba(0,168,107,0.25);
  }
  .result-sub {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 22px;
    font-weight: 600;
  }
  .stars-row {
    font-size: 36px;
    letter-spacing: 6px;
    margin-bottom: 18px;
  }
  .restart-btn {
    display: inline-block;
    padding: 14px 36px;
    background: linear-gradient(135deg, var(--blue), #1a5fa8);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.18s ease;
    box-shadow: 0 4px 16px rgba(26,111,196,0.30);
  }
  .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(26,111,196,0.38); }

  /* SCORE DOTS */
  .score-dots {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid #e5e7eb;
  }
  .dot.hit { background: var(--green); border-color: var(--green); }
  .dot.miss { background: var(--red); border-color: var(--red); }

  /* ANIMATIONS */
  @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
  @keyframes bounce { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }

  /* FOOTER */
  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="header">
  <div class="flag-stripe"><span class="s1"></span><span class="s2"></span><span class="s3"></span></div>
  <h1>Quiz de <span>Geografia</span><br>do Brasil 🇧🇷</h1>
  <p>Responda as perguntas e mostre que você sabe tudo!</p>
</div>

<div class="card" id="card">
  <div id="quiz-area"></div>
</div>

<div class="footer">Baseado no mapa mental de Geografia do Brasil</div>

<script>
const questions = [
  { q: "O Brasil é um país da América do Sul. Qual é a capital do Brasil? 🏛️", opts: ["Rio de Janeiro","São Paulo","Brasília","Salvador"], answer: 2, tip: "✅ Brasília é a capital! Ela fica no Distrito Federal e foi construída especialmente para ser a capital do país." },
  { q: "O Brasil é dividido em quantas regiões? 🗺️", opts: ["3 regiões","4 regiões","5 regiões","6 regiões"], answer: 2, tip: "✅ O Brasil tem 5 regiões: Norte, Nordeste, Centro-Oeste, Sudeste e Sul!" },
  { q: "Qual região do Brasil é a mais fria e pode até nevar? ❄️", opts: ["Norte","Nordeste","Sudeste","Sul"], answer: 3, tip: "✅ A região Sul (PR, SC e RS) é a mais fria e tem agricultura forte. É lá que às vezes neva!" },
  { q: "Qual região tem a floresta Amazônica? 🌿", opts: ["Sudeste","Norte","Sul","Centro-Oeste"], answer: 1, tip: "✅ A região Norte tem a maior floresta do mundo, a Amazônia! Estados como AM, PA, AC e RO ficam lá." },
  { q: "Quem administra o Brasil no Poder Executivo Federal? 👨‍💼", opts: ["Prefeito","Vereador","Presidente","Juiz"], answer: 2, tip: "✅ O Presidente cuida do país inteiro! O Governador cuida do estado e o Prefeito cuida da cidade." },
  { q: "O Poder Judiciário é responsável por qual função? ⚖️", opts: ["Fazer as leis","Administrar o país","Julgar e fazer cumprir as leis","Cuidar das escolas"], answer: 2, tip: "✅ O Judiciário tem juízes e tribunais que julgam quando alguém descumpre a lei." },
  { q: "Qual é a menor divisão do território com Prefeito e Vereadores? 🏘️", opts: ["Estado","Região","País","Município"], answer: 3, tip: "✅ O Município é a menor divisão! O Prefeito administra a cidade e os Vereadores fazem as leis locais." },
  { q: "Qual dessas é um exemplo de matéria-prima? 🌾", opts: ["Televisão","Tênis","Algodão","Carro"], answer: 2, tip: "✅ O algodão é matéria-prima! Ele é usado para fabricar roupas e tecidos." },
  { q: "Petróleo e gás natural são exemplos de qual tipo de recurso natural? 🛢️", opts: ["Renovável","Não Renovável","Reciclável","Natural puro"], answer: 1, tip: "✅ Petróleo e gás natural são NÃO renováveis — podem acabar! Por isso precisamos usar com cuidado." },
  { q: "O que fazemos para ter um Consumo Consciente? ♻️", opts: ["Comprar tudo sempre","Desperdiçar água","Reciclar e economizar água","Jogar lixo no rio"], answer: 2, tip: "✅ Consumo consciente: reciclar, economizar água, preservar a natureza e usar os recursos com responsabilidade!" },
  { q: "Qual região do Brasil é a mais rica, com São Paulo e Rio de Janeiro? 🏙️", opts: ["Norte","Nordeste","Sul","Sudeste"], answer: 3, tip: "✅ O Sudeste (SP, RJ, MG, ES) é a região mais rica, com muitas indústrias e grandes cidades!" },
  { q: "O Pantanal fica em qual região do Brasil? 🐊", opts: ["Norte","Sul","Centro-Oeste","Nordeste"], answer: 2, tip: "✅ O Pantanal fica no Centro-Oeste! É uma das maiores áreas alagadas do mundo, cheia de animais." }
];

const letters = ['A','B','C','D'];
let current = 0, score = 0, answered = false, results = [];
let shuffled = [];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function init() {
  shuffled = shuffle(questions);
  current = 0; score = 0; answered = false; results = [];
  render();
}

function render() {
  const area = document.getElementById('quiz-area');
  if (current >= shuffled.length) { renderResult(); return; }
  const q = shuffled[current];
  const pct = Math.round((current / shuffled.length) * 100);
  area.innerHTML = `
    <div class="progress-row">
      <span>Pergunta ${current+1} de ${shuffled.length}</span>
      <span>⭐ ${score} acerto${score!==1?'s':''}</span>
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="question-num">Pergunta ${current+1}</div>
    <div class="question-text">${q.q}</div>
    <div class="options">
      ${q.opts.map((o,i)=>`
        <button class="opt" id="opt${i}" onclick="pick(${i})">
          <span class="opt-icon">${letters[i]}</span>${o}
        </button>`).join('')}
    </div>
    <div id="feedback"></div>
    <button class="next-btn" id="nextbtn" style="display:none" onclick="next()">
      ${current+1 < shuffled.length ? 'Próxima pergunta →' : 'Ver resultado 🎉'}
    </button>
  `;
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const q = shuffled[current];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  const isCorrect = idx === q.answer;
  if (isCorrect) {
    score++;
    btns[idx].classList.add('correct');
    fb.innerHTML = `<div class="feedback correct">${q.tip}</div>`;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.answer].classList.add('reveal');
    fb.innerHTML = `<div class="feedback wrong">❌ Quase! A resposta certa era: <strong>${q.opts[q.answer]}</strong>. ${q.tip.replace('✅ ','')}</div>`;
  }
  results.push(isCorrect);
  document.getElementById('nextbtn').style.display = 'block';
}

function next() {
  current++;
  answered = false;
  render();
}

function renderResult() {
  const area = document.getElementById('quiz-area');
  const pct = Math.round((score / shuffled.length) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 50 ? '🌟' : '📚';
  const msg = pct >= 80 ? 'Incrível! Você arrasou!' : pct >= 50 ? 'Muito bem! Continue estudando!' : 'Continue tentando, você vai melhorar!';
  const starCount = pct >= 80 ? 3 : pct >= 50 ? 2 : 1;
  const stars = '⭐'.repeat(starCount) + '☆'.repeat(3 - starCount);
  const dots = results.map(r => `<div class="dot ${r?'hit':'miss'}"></div>`).join('');

  area.innerHTML = `
    <div class="result-screen">
      <span class="result-emoji">${emoji}</span>
      <div class="result-title">${msg}</div>
      <div class="stars-row">${stars}</div>
      <div class="score-dots">${dots}</div>
      <div class="result-score">${score} de ${shuffled.length} acertos</div>
      <div class="result-sub">Você acertou ${pct}% das perguntas!</div>
      <button class="restart-btn" onclick="init()">🔄 Jogar de novo</button>
    </div>
  `;
}

init();
</script>
</body>
</html>
