<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aventura Geográfica do Brasil</title>
<style>
  :root{--green:#2e7d32;--yellow:#f9c74f;--blue:#277da1;--red:#f94144;--cream:#fff8e7;--dark:#253237;}
  *{box-sizing:border-box} body{margin:0;font-family:Arial, Helvetica, sans-serif;background:linear-gradient(135deg,#d8f3dc,#fff3b0);color:var(--dark);min-height:100vh;}
  .wrap{max-width:980px;margin:0 auto;padding:20px}.card{background:white;border-radius:24px;box-shadow:0 12px 30px #0002;padding:22px;border:4px solid #fff}.hero{text-align:center;margin-top:8px}.hero h1{font-size:clamp(28px,5vw,52px);margin:8px 0;color:var(--green);text-shadow:2px 2px 0 #ffe066}.subtitle{font-size:20px;margin:8px 0 18px}.btn{border:0;border-radius:16px;padding:14px 20px;font-weight:800;font-size:18px;cursor:pointer;background:var(--yellow);box-shadow:0 5px 0 #d9a520;transition:.1s}.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #d9a520}.btn-blue{background:#90dbf4;box-shadow:0 5px 0 #277da1}.btn-green{background:#95d5b2;box-shadow:0 5px 0 #2e7d32}.btn-red{background:#ffadad;box-shadow:0 5px 0 #c1121f}.topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}.pill{background:#fff;border:3px solid #e9ecef;border-radius:999px;padding:10px 14px;font-weight:bold}.map{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0}.region{min-height:82px;border-radius:18px;padding:10px;text-align:center;font-weight:900;display:flex;align-items:center;justify-content:center;flex-direction:column;border:4px solid #fff;box-shadow:0 7px 14px #0001}.region span{font-size:28px}.done{filter:grayscale(.15);outline:5px solid #52b788}.current{animation:pulse 1s infinite alternate;outline:5px dashed #ffb703}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.04)}}.question{font-size:24px;font-weight:900;margin:14px 0;line-height:1.3}.answers{display:grid;grid-template-columns:1fr 1fr;gap:12px}.answer{background:#f1f8ff;border:3px solid #caf0f8;border-radius:18px;padding:16px;font-size:18px;font-weight:800;cursor:pointer;text-align:left}.answer:hover{background:#dff6ff}.feedback{margin-top:16px;border-radius:18px;padding:16px;font-size:19px;font-weight:700;display:none}.ok{background:#d8f3dc;border:3px solid #52b788}.bad{background:#ffe5e5;border:3px solid #ef476f}.small{font-size:15px;font-weight:600}.progress{height:22px;background:#e9ecef;border-radius:999px;overflow:hidden;border:3px solid white;box-shadow:inset 0 2px 4px #0002}.bar{height:100%;width:0;background:linear-gradient(90deg,#43aa8b,#f9c74f);transition:.4s}.badgeBox{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:12px}.badge{background:#fff3b0;border:3px solid #f9c74f;border-radius:999px;padding:8px 12px;font-weight:900}.hidden{display:none}.mascot{font-size:64px}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.confetti i{position:absolute;font-style:normal;animation:fall 1.8s linear forwards;font-size:24px}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}@media(max-width:700px){.answers{grid-template-columns:1fr}.map{grid-template-columns:1fr}.topbar{justify-content:center}.question{font-size:21px}}
</style>
</head>
<body>
<div class="wrap">
  <section id="start" class="card hero">
    <div class="mascot">🧭🇧🇷</div>
    <h1>Aventura Geográfica do Brasil</h1>
    <p class="subtitle">Ajude a exploradora Bia a viajar pelo Brasil respondendo perguntas da prova!</p>
    <p>Você ganha estrelas, desbloqueia regiões e recebe explicação na hora quando errar.</p>
    <button class="btn btn-green" onclick="startGame()">Começar aventura!</button>
  </section>

  <section id="game" class="card hidden">
    <div class="topbar">
      <div class="pill">⭐ Estrelas: <span id="score">0</span></div>
      <div class="pill">❤️ Vidas: <span id="lives">3</span></div>
      <div class="pill">🧩 Fase: <span id="level">1</span>/<span id="total"></span></div>
    </div>
    <div class="progress"><div id="bar" class="bar"></div></div>
    <div class="map" id="map"></div>
    <div class="question" id="question"></div>
    <div class="answers" id="answers"></div>
    <div id="feedback" class="feedback"></div>
    <button id="next" class="btn btn-blue hidden" onclick="nextQuestion()">Próxima missão ➜</button>
  </section>

  <section id="end" class="card hero hidden">
    <div class="mascot">🏆</div>
    <h1>Missão concluída!</h1>
    <p class="subtitle" id="finalText"></p>
    <div class="badgeBox" id="badges"></div>
    <br><button class="btn" onclick="restart()">Jogar de novo</button>
  </section>
</div>
<div class="confetti" id="confetti"></div>
<script>
const missions = [
  {region:'Brasil', emoji:'🇧🇷', color:'#b7e4c7', q:'Qual é a capital do Brasil?', a:['São Paulo','Brasília','Rio de Janeiro','Salvador'], c:1, exp:'A capital do Brasil é Brasília, localizada na região Centro-Oeste.'},
  {region:'Poderes', emoji:'⚖️', color:'#ffd6a5', q:'Quais são os três poderes do Brasil?', a:['Executivo, Legislativo e Judiciário','Prefeito, Vereador e Escola','Norte, Sul e Sudeste','Federal, Estadual e Municipal'], c:0, exp:'Os três poderes são Executivo, Legislativo e Judiciário.'},
  {region:'Executivo', emoji:'🏛️', color:'#caf0f8', q:'Quem faz parte do Poder Executivo federal?', a:['Presidente','Juízes','Deputados','Senadores'], c:0, exp:'No nível federal, o Executivo é representado pelo Presidente.'},
  {region:'Município', emoji:'🏙️', color:'#ffc8dd', q:'No município, quem administra a cidade?', a:['Presidente','Governador','Prefeito','Senador'], c:2, exp:'O prefeito administra a cidade. Os vereadores criam leis municipais e fiscalizam.'},
  {region:'Regiões', emoji:'🗺️', color:'#cdb4db', q:'Quantas regiões o Brasil tem?', a:['3','4','5','6'], c:2, exp:'O Brasil tem 5 regiões: Norte, Nordeste, Centro-Oeste, Sudeste e Sul.'},
  {region:'Norte', emoji:'🌳', color:'#95d5b2', q:'Qual característica combina com a região Norte?', a:['Floresta Amazônica','Pampas','Grandes cidades industriais','Frio intenso o ano todo'], c:0, exp:'A região Norte é muito associada à Floresta Amazônica e ao clima quente e úmido.'},
  {region:'Nordeste', emoji:'☀️', color:'#ffe066', q:'Qual alternativa combina com a região Nordeste?', a:['Amazônia e frio','Turismo forte e clima quente','Pampas e neve','Capital Brasília'], c:1, exp:'O Nordeste tem turismo forte, clima quente e estados como BA, PE, CE, AL, PB, RN, SE, PI e MA.'},
  {region:'Sul', emoji:'🌾', color:'#a3c4f3', q:'Qual é uma característica da região Sul?', a:['Região mais fria do Brasil','Maior floresta tropical','Onde fica Brasília','Não tem agricultura'], c:0, exp:'O Sul é a região mais fria e tem estados como PR, SC e RS.'},
  {region:'Recursos', emoji:'💧', color:'#bde0fe', q:'Qual destes é um recurso natural renovável?', a:['Petróleo','Carvão mineral','Água, quando usada com cuidado','Gás natural'], c:2, exp:'Água pode se renovar na natureza, mas precisa ser preservada e usada com responsabilidade.'},
  {region:'Consumo', emoji:'♻️', color:'#d8f3dc', q:'Qual atitude mostra consumo consciente?', a:['Desperdiçar comida','Jogar lixo no rio','Economizar água e reciclar','Comprar sem precisar'], c:2, exp:'Consumo consciente é usar recursos com responsabilidade: economizar água, reciclar e evitar desperdício.'},
  {region:'Matéria-prima', emoji:'🪵', color:'#f1c0e8', q:'O que é matéria-prima?', a:['Produto já pronto na loja','Material usado para fabricar produtos','A capital de um país','Um tipo de governo'], c:1, exp:'Matéria-prima é o material usado para fabricar produtos, como madeira, leite, trigo e algodão.'},
  {region:'Desafio Final', emoji:'🚀', color:'#ffadad', q:'O algodão pode ser usado para fabricar qual produto?', a:['Roupas','Gasolina','Petróleo','Carvão'], c:0, exp:'O algodão é uma matéria-prima usada para fabricar roupas e tecidos.'}
];
let i=0, score=0, lives=3, locked=false, badges=[];
const $=id=>document.getElementById(id);
function startGame(){ $('start').classList.add('hidden'); $('game').classList.remove('hidden'); $('total').textContent=missions.length; drawMap(); showQuestion(); }
function drawMap(){ const map=$('map'); map.innerHTML=''; missions.forEach((m,idx)=>{const d=document.createElement('div'); d.className='region '+(idx<i?'done':'')+(idx===i?' current':''); d.style.background=m.color; d.innerHTML=`<span>${m.emoji}</span>${m.region}`; map.appendChild(d);}); }
function showQuestion(){ locked=false; const m=missions[i]; $('level').textContent=i+1; $('score').textContent=score; $('lives').textContent=lives; $('bar').style.width=(i/missions.length*100)+'%'; $('question').textContent=`${m.emoji} Missão ${i+1}: ${m.q}`; $('feedback').style.display='none'; $('feedback').className='feedback'; $('next').classList.add('hidden'); const ans=$('answers'); ans.innerHTML=''; m.a.forEach((txt,idx)=>{const b=document.createElement('button'); b.className='answer'; b.textContent=txt; b.onclick=()=>choose(idx,b); ans.appendChild(b);}); drawMap(); }
function choose(idx,btn){ if(locked)return; locked=true; const m=missions[i]; const buttons=[...document.querySelectorAll('.answer')]; buttons.forEach((b,k)=>{b.disabled=true; if(k===m.c){b.style.background='#d8f3dc'; b.style.borderColor='#52b788';} }); const fb=$('feedback'); if(idx===m.c){ score+=10; fb.className='feedback ok'; fb.innerHTML=`🎉 <b>Acertou!</b><br>${m.exp}`; if((i+1)%3===0) {badges.push('🏅 Explorador nível '+((i+1)/3)); sparkle();} } else { lives--; btn.style.background='#ffe5e5'; btn.style.borderColor='#ef476f'; fb.className='feedback bad'; fb.innerHTML=`😮 <b>Quase!</b> A resposta correta é: <u>${m.a[m.c]}</u>.<br>${m.exp}`; }
 $('score').textContent=score; $('lives').textContent=lives; fb.style.display='block'; $('next').classList.remove('hidden'); if(lives<=0){ $('next').textContent='Ver resultado ➜'; }
}
function nextQuestion(){ if(lives<=0 || i===missions.length-1){finish();return;} i++; showQuestion(); $('next').textContent='Próxima missão ➜'; }
function finish(){ $('game').classList.add('hidden'); $('end').classList.remove('hidden'); $('bar').style.width='100%'; let msg = score>=90?'Você virou Mestre da Geografia do Brasil!': score>=60?'Muito bem! Você está quase craque. Jogue de novo para ganhar mais estrelas!':'Boa tentativa! Revise as explicações e tente novamente.'; $('finalText').innerHTML=`Você fez <b>${score}</b> estrelas de ${missions.length*10}.<br>${msg}`; const box=$('badges'); box.innerHTML=''; if(badges.length===0) badges=['🌱 Aprendiz da Geografia']; badges.forEach(b=>{const s=document.createElement('span');s.className='badge';s.textContent=b;box.appendChild(s)}); sparkle(); }
function restart(){ i=0;score=0;lives=3;badges=[];$('end').classList.add('hidden');$('game').classList.remove('hidden');showQuestion(); }
function sparkle(){ const c=$('confetti'); const items=['⭐','🇧🇷','🎉','🗺️','🏆']; for(let n=0;n<35;n++){const el=document.createElement('i');el.textContent=items[Math.floor(Math.random()*items.length)];el.style.left=Math.random()*100+'vw';el.style.top='-30px';el.style.animationDelay=Math.random()*0.5+'s';c.appendChild(el);setTimeout(()=>el.remove(),2300);} }
</script>
</body>
</html>
